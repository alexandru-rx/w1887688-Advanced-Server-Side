<!DOCTYPE html>
<html>
<head>
  <title>University Analytics Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
</head>
<body>

  <h1>University Analytics Dashboard</h1>

  <section>
  <h2>Filters</h2>
  <div class="filter-grid">
    <input type="text" id="filterProgramme" placeholder="Programme">
    <input type="text" id="filterIndustry" placeholder="Industry Sector">
    <input type="number" id="filterYear" placeholder="Graduation Year">
    <button id="applyFiltersBtn">Apply Filters</button>
  </div>
</section>

  <div class="export-section">
  <button id="exportBtn">Export Alumni Data (CSV)</button>
  </div>

  <nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="profile.html">My Profile</a>
    <a href="login.html">Logout</a>
  </nav>

  <section class="summary-grid">
    <div class="summary-card">
      <h2>Total Alumni</h2>
      <p id="totalAlumni">0</p>
    </div>

    <div class="summary-card">
      <h2>Total Programmes</h2>
      <p id="totalProgrammes">0</p>
    </div>

    <div class="summary-card">
      <h2>Top Industry</h2>
      <p id="topIndustry">N/A</p>
    </div>
  </section>

  <section>
    <h2>Alumni by Industry</h2>
    <canvas id="industryChart"></canvas>
  </section>

  <section>
    <h2>Alumni by Programme</h2>
    <canvas id="programmeChart"></canvas>
  </section>

  <section>
    <h2>Alumni by Graduation Year</h2>
    <canvas id="graduationYearChart"></canvas>
  </section>

  <section>
  <h2>Top Skills</h2>
  <canvas id="skillsChart"></canvas>
  </section>

  <section>
  <h2>API Usage Logs</h2>
  <div class="table-wrapper">
    <table id="usageTable">
      <thead>
        <tr>
          <th>Key Name</th>
          <th>Endpoint</th>
          <th>Method</th>
          <th>Accessed At</th>
        </tr>
      </thead>
      <tbody id="usageTableBody">
        <tr>
          <td colspan="4">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

  <script src="app.js"></script>
  <script src="charts.js"></script>
  <script src="export.js"></script>

</body>
</html>
